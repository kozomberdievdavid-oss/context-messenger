<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <title>context</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h1 class="logo">context</h1>
            <div class="input-group">
                <span class="material-icons">person</span>
                <input type="text" id="username-input" placeholder="Имя пользователя">
            </div>
            <div class="input-group">
                <span class="material-icons">email</span>
                <input type="email" id="email-input" placeholder="Ваш Email">
            </div>
            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" id="password-input" placeholder="Пароль">
            </div>
            <div class="auth-buttons">
                <button class="primary-btn" onclick="auth('login')">Войти</button>
                <button class="secondary-btn" onclick="auth('register')">Регистрация</button>
            </div>
            <p id="login-error"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen" style="display: none;">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Чаты</h3>
                <button class="icon-btn" onclick="logout()" title="Выйти">
                    <span class="material-icons">logout</span>
                </button>
            </div>
            <div class="search-tabs">
                <button onclick="setMode('users')" id="btn-users" class="active"><span class="material-icons">people</span></button>
                <button onclick="setMode('files')" id="btn-files"><span class="material-icons">folder</span></button>
                <button onclick="setMode('web')" id="btn-web"><span class="material-icons">public</span></button>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск..." onkeyup="handleSearch()">
            </div>
            <ul id="sidebar-list"></ul>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="user-info">
                    <span class="material-icons">account_circle</span>
                    <span id="current-chat-user">Выберите чат</span>
                </div>
            </div>
            
            <div id="messages-container"></div>
            
            <div id="typing-indicator" style="font-size: 12px; color: var(--accent); height: 15px; padding-left: 20px;"></div>
            
            <div class="chat-input-area" id="input-area" style="display: none;">
                <input type="file" id="file-input" style="display: none;" onchange="uploadFile()">
                <button class="attach-btn" onclick="document.getElementById('file-input').click()">
                    <span class="material-icons">attach_file</span>
                </button>
                <input type="text" id="message-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">
                    <span class="material-icons">send</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
